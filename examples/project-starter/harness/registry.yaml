version: 0

imports:
  - ../../../harness/policies/shared/governance-baseline.yaml
  - ../../../harness/policies/shared/project-stubs.yaml
  - ../../../harness/policies/shared/project-mcp.yaml

guides:
  shared:
    - path: common/project-baseline.md
      scope: project
  claude:
    - path: claude/review.md
      scope: project
  codex:
