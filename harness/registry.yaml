version: 0

meta:
  name: soft-harness
  description: Single-truth harness for Claude and Codex environments
  supported_hosts:
    - claude
    - codex
  scopes:
    - account
    - project

imports:
  - ./registry.d/*.yaml

defaults:
  secrets_policy: local-only
  generated_files_policy: generated-is-derived
  vendor_install_policy: upstream-owned
  guides_root: ./guides
  ignore:
    doctor_paths: []
    migrate_paths: []

capabilities: []

guides:
  shared: []
  claude: []
  codex: []

outputs: []
